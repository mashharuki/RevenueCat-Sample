name: BreakoutGame
options:
  bundleIdPrefix: com.haruki
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  BreakoutGame:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  BreakoutGameTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/BreakoutGameTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: BreakoutGame
